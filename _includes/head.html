<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.data.content.branding.site_name }}</title>
  <meta name="description" content="{{ site.data.content.branding.tag_line }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --brand-primary: {{ site.data.content.branding.primary_color }};
      --brand-secondary: {{ site.data.content.branding.secondary_color }};
      --brand-accent: {{ site.data.content.branding.accent_color }};
      --brand-font: {{ site.data.content.branding.font_family }};
    }

    body {
      font-family: var(--brand-font);
      color: var(--brand-secondary);
    }

    .hero {
      background: linear-gradient(135deg, rgba(13, 110, 253, 0.1), rgba(25, 135, 84, 0.08));
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    .navbar-brand {
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .brand-accent {
      color: var(--brand-accent);
    }

    .card-elevated {
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 0.35rem 1rem rgba(0, 0, 0, 0.06);
    }
  </style>
</head>
