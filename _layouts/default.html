<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.data.content.branding.site_name }}</title>
    <meta name="description" content="{{ site.data.content.branding.tag_line }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
      :root {
        --brand-primary: {{ site.data.content.branding.primary_color }};
        --brand-secondary: {{ site.data.content.branding.secondary_color }};
        --brand-accent: {{ site.data.content.branding.accent_color }};
        --brand-font: {{ site.data.content.branding.font_family }};
      }

      body {
        font-family: var(--brand-font);
        color: var(--brand-secondary);
      }

      .hero {
        background: linear-gradient(135deg, rgba(13, 110, 253, 0.1), rgba(25, 135, 84, 0.08));
        border: 1px solid rgba(0, 0, 0, 0.08);
      }

      .navbar-brand {
        font-weight: 700;
        letter-spacing: 0.2px;
      }

      .brand-accent {
        color: var(--brand-accent);
      }

      .card-elevated {
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 0.35rem 1rem rgba(0, 0, 0, 0.06);
      }
    </style>
  </head>
  <body>
    <a class="visually-hidden-focusable position-absolute top-0 start-0 p-2 bg-white border" href="#main-content">Skip to main content</a>

    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
      <div class="container">
        <a class="navbar-brand" href="{{ '/' | relative_url }}">{{ site.data.content.branding.site_name }}</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="{{ '/skills/' | relative_url }}">Skills</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ '/courses/' | relative_url }}">Courses</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ '/about/' | relative_url }}">About</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main id="main-content" class="py-4">
      {{ content }}
    </main>

    <footer class="border-top py-4 mt-4">
      <div class="container small text-body-secondary">
        <div class="d-flex gap-2 align-items-center">
          <i class="bi bi-diagram-3"></i>
          <span>{{ site.data.content.branding.tag_line }}</span>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
