<!doctype html>
<html lang="en">
  {% include head.html %}
  <body>
    <a class="visually-hidden-focusable position-absolute top-0 start-0 p-2 bg-white border" href="#main-content">Skip to main content</a>

    {% include navigation.html %}

    <main id="main-content" class="py-4">
      {{ content }}
    </main>

    {% include footer.html %}

    <a
      class="fork-me-ribbon"
      href="https://github.com/berthelemy/skills-framework"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Fork me on GitHub"
      data-external-link-decorated="true"
    >Fork me on GitHub</a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
      <script>
        // Checks for external links and adds appropriate attributes and icons
        document.addEventListener('DOMContentLoaded', () => {
          const currentOrigin = window.location.origin;

          document.querySelectorAll('a[href]').forEach((link) => {
            if (link.dataset.externalLinkDecorated === 'true') {
              return;
            }

            let targetUrl;

            try {
              targetUrl = new URL(link.getAttribute('href'), window.location.href);
            } catch (error) {
              return;
            }

            const isExternal = targetUrl.origin !== currentOrigin;
            const isWebProtocol = targetUrl.protocol === 'http:' || targetUrl.protocol === 'https:';

            if (!isExternal || !isWebProtocol) {
              return;
            }

            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.dataset.externalLinkDecorated = 'true';

            if (link.querySelector('.external-link-icon')) {
              return;
            }

            const icon = document.createElement('i');
            icon.className = 'bi bi-box-arrow-up-right ms-1 external-link-icon';
            icon.setAttribute('aria-hidden', 'true');
            link.appendChild(icon);

            const hiddenLabel = document.createElement('span');
            hiddenLabel.className = 'visually-hidden';
            hiddenLabel.textContent = ' Opens in a new window.';
            link.appendChild(hiddenLabel);
          });
        });
      </script>
  </body>
</html>
