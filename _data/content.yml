# This file contains user-adjustable site-wide variables and settings for the Jekyll site. These variables can be accessed in templates and pages using the `site` object, e.g., `{{ site.title }}`.
# They sit separately from the _config.yml file to allow changes to content with less risk of breaking site configuration.
# Do NOT change the key names (eg. site_name) unless you know what you are doing. You CAN change the key values (eg. Skills Framework Site)

home_text: This reference site shows how we can develop a skills framework that can be read easily by both humans and AI agents. Feel free to fork this site and make your own skills framework with it.
branding:
  site_name: Skills Framework Reference Site
  tag_line: Human skills in a machine-readable format
  primary_color: "#146E6D"
  secondary_color: "#1F2933"
  accent_color: "#0F5656"
  link_color: "#0F5656"
  link_hover_color: "#0A4242"
  link_visited_color: "#083737"
  font_family: "system-ui, sans-serif"
  organisation:
    name: Your Organization Name
    url: https://example.com
seo:
  default_description: Human skills modeled for people and agents.
  default_image: /assets/images/social-card.svg
  twitter_card: summary_large_image
search:
  search-terms: semantic HTML, keyboard access, taxonomy # Typical search terms to suggest to users
configuration:
  alert_message: true # Set to 'false' to hide the alert message at the top of the page