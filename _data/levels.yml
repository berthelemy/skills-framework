- level_number: 1
  title: Awareness
  description: Understands the concept and basic terminology.
- level_number: 2
  title: Basic Application
  description: Applies the skill with guidance in simple situations.
- level_number: 3
  title: Working Practice
  description: Performs the skill independently in routine work.
- level_number: 4
  title: Advanced Practice
  description: Adapts the skill to varied situations and constraints.
- level_number: 5
  title: Expert Practice
  description: Leads complex application of the skill across teams or systems.
- level_number: 6
  title: Strategic Influence
  description: Shapes how the skill is used across an organization.
- level_number: 7
  title: Transformational Leadership
  description: Defines direction and drives major change at the highest level.
