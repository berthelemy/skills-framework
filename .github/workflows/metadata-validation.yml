name: Metadata Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Validate metadata and generated artifacts
        run: ./scripts/validate_metadata.sh
